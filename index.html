<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musinet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/styles/estilos_home.css">
</head>
<body>

    <header>

        <section class="banner">

        </section>

    </header>
    <main>
        <section class="container">
            <section class="row justify-content-center">
                <section class="col-5 m-5 p-5 text-center">
                    <h3>Musinet &copy;</h3>
                    <hr>
                    <form class="border rounded p-4 shadow my-3">
                        <input type="text" placeholder="nombre Usuario" id="nombre" class="form-control mb-3">
                        <input type="email" placeholder="correo@correo.com" id="correo" class="form-control mb-3">
                        <input type="password" placeholder="contraseña" id="contraseña" class="form-control mb-3">
                        <button type="submit" class="btn btn-outline-dark" id="boton">Ingresar</button>
                    </form>
                </section>
            </section>
        </section>
    </main>
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./src/controllers/controladorLogin.js"></script>
</body>
</html>
